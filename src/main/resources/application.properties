spring.application.name=haiku-generator
spring.ai.anthropic.api-key=${SPRING_AI_ANTHROPIC_API_KEY:stub-key}
spring.ai.anthropic.chat.options.model=claude-sonnet-4-6
spring.ai.anthropic.chat.options.max-tokens=256

haiku.memory.max-messages=20
haiku.memory.conversation-ttl-minutes=60
haiku.memory.eviction-interval-ms=600000

# Actuator
management.endpoints.web.exposure.include=health,prometheus,metrics
#management.endpoint.prometheus.access=unrestricted

# Spring AI Observability
logging.level.org.springframework.ai.chat.client.advisor=DEBUG
spring.ai.chat.client.observations.log-prompt=false
spring.ai.chat.client.observations.log-completion=false
spring.ai.chat.observations.log-prompt=false
spring.ai.chat.observations.log-completion=false
